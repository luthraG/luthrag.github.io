name: Refresh GitHub stats

on:
  schedule:
    - cron: "17 2 * * 1" # Mondays 02:17 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Fetch stats
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/fetch-stats.mjs
      - name: Commit updated stats
        run: |
          git config user.name "Gaurav Luthra"
          git config user.email "luthra.zenith@gmail.com"
          git add data/stats.json
          git diff --cached --quiet || git commit -m "Refresh GitHub stats"
          git push
