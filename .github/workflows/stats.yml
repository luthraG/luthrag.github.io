name: Refresh GitHub stats

on:
  schedule:
    - cron: "30 4 * * 2" # Tuesdays 04:30 UTC (10:00 AM IST)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Fetch stats
        env:
          # Must be a personal access token: the default Actions GITHUB_TOKEN is
          # repo-scoped and returns zeros for user contribution data.
          GITHUB_TOKEN: ${{ secrets.STATS_TOKEN }}
        run: node scripts/fetch-stats.mjs
      - name: Commit updated stats
        run: |
          git config user.name "Gaurav Luthra"
          git config user.email "luthra.zenith@gmail.com"
          git add data/stats.json
          git diff --cached --quiet || git commit -m "Refresh GitHub stats"
          git push
